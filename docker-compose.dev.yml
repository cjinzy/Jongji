services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jongji
      POSTGRES_USER: jongji
      POSTGRES_PASSWORD: jongji
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jongji"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
      target: dev
    environment:
      DATABASE_URL: postgresql+asyncpg://jongji:jongji@postgres:5432/jongji
      SECRET_KEY: dev-secret-key
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/tests:/app/tests
      - ./backend/alembic:/app/alembic
    depends_on:
      postgres:
        condition: service_healthy
    command: uv run uvicorn jongji.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_dev_data:
