# E2E test compose — run with:
#   COMPOSE_PROJECT_NAME=jongji-e2e docker compose -f docker-compose.e2e.yml up

services:
  postgres:
    image: postgres:16-alpine
    env_file: .env.e2e
    volumes:
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jongji"]
      interval: 3s
      timeout: 3s
      retries: 10
    ports:
      - "5433:5432"

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    env_file: .env.e2e
    ports:
      - "3101:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "uv run alembic upgrade head && uv run uvicorn jongji.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
      target: prod
    ports:
      - "3100:80"
    depends_on:
      - backend
